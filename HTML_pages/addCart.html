<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddToCart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/CSS_pages/addCart.css">
</head>

<body>

     <nav>
    </nav>

    <div class="cart_container">
        <div class="container_child_1">
            <h1>Shopping Cart</h1>
        </div>
        <div class="container_child_2">
            <div class="product_box">
                <div class="heading_box">
                    <h3>Product</h3>
                    <div class="quantity">
                        <h3>Quantity</h3>
                        <h3>Total Price</h3>
                    </div>
                </div>

                <div class="cart_box">
                </div>
            </div>


            <div class="cart_price_box">
                <h3>Cart Total</h3>
                <div class="price_box">
                    <p>Total</p>
                    <p>₹<span class="total"></span></p>
                </div>
                
                <div class="price_box">
                    <p>Tax <span>18%</span></p>
                    <p>₹<span class="tax_price"></span></p>
                </div>
                <div class="price_box">
                    <p>Delivery Charge</p>
                    <p>₹<span class="delivery_price"></span></p>
                </div>
                <div class="price_box">
                    <p>Grand Total</p>
                    <p>₹<span class="grandTotal_price"></span></p>
                </div> <br>
                <div class="coupon_input">
                    <div class="inputBox">
                        <input type="text" class="couponInput" placeholder="Enter Coupon Code" >
                        <h5>Coupon Code 1234 😮 20% off</h5>
                    </div>
                    <button class="coupon_btn">Apply</button>
                </div>
                <button type="submit">Proceed to checkout</button>
            </div>
        </div>

    </div>

    <footer class="footer">
    </footer>
</body>
<!-- <script src="../JS_pages/Living.js"></script> -->
 <script src="../JS_pages//addCart.js"></script>

<script type="module">
    import { navBar, navFooterStyle, fooTer } from "../JS_pages/Components.js";

    document.querySelector('nav').innerHTML = navBar();
    document.querySelector('.footer').innerHTML = fooTer();
    let styleTag = document.createElement("style");
    styleTag.textContent = navFooterStyle();
    document.head.append(styleTag);
</script>

</html>
